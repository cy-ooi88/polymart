<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BTC Up or Down - 5 Minutes</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
</head>
<body>
  <main class="app">
    <header class="top-row">
      <div class="event-ident">
        <div class="asset-icon">B</div>
        <div class="title-wrap">
          <h1 id="eventTitle" class="event-title">BTC Up or Down - 5 Minutes</h1>
          <div id="eventSub" class="event-sub">Loading current event...</div>
          <div class="event-links">
            <a id="eventSlug" class="event-slug" href="https://gamma-api.polymarket.com/events" target="_blank" rel="noopener noreferrer">Gamma API</a>
            <a id="liveResultLink" class="event-slug" href="https://polymarket.com/markets" target="_blank" rel="noopener noreferrer">Live Result</a>
          </div>
        </div>
      </div>

      <div class="wallet-section">
        <button id="connectWalletBtn" class="wallet-btn" type="button">Connect Wallet</button>
        <button id="disconnectWalletBtn" class="wallet-btn" type="button" style="display: none;">Disconnect</button>
        <div id="walletAddress" class="wallet-address"></div>
      </div>

      <div class="timer" aria-label="Countdown timer">
        <div class="timer-cell">
          <div id="timerMins" class="timer-value">--</div>
          <div class="timer-unit">MINS</div>
        </div>
        <div class="timer-cell">
          <div id="timerSecs" class="timer-value">--</div>
          <div class="timer-unit">SECS</div>
        </div>
      </div>
    </header>

    <section class="metric-row">
      <article class="metric">
        <div class="metric-label">Price To Beat</div>
        <div id="priceToBeat" class="metric-value target">$--</div>
        <div class="target-breakdown">
          <div class="target-row"><span>Chainlink canonical</span><strong id="canonicalPrice">$--</strong></div>
          <div class="target-row"><span>Fallback</span><strong id="fallbackPrice">$--</strong></div>
        </div>
      </article>
      <article class="metric">
        <div class="metric-label current">Current Price <span id="priceDelta" class="price-delta"></span></div>
        <div id="btcPrice" class="metric-value current">$--</div>
      </article>
    </section>

    <section class="chart-panel">
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
        <div class="chart-controls" aria-hidden="true">
          <button class="chart-mode active" type="button">B</button>
          <button class="chart-mode" type="button">|||</button>
        </div>
        <div id="targetTag" class="target-tag">Target</div>
      </div>
    </section>

    <section class="actions">
      <div class="order-size-control">
        <label for="orderSize">Order Size (USDC):</label>
        <input id="orderSize" type="number" min="0.1" step="0.1" value="1" />
      </div>
      <div class="action-group">
        <button id="buyUpBtn" class="buy-btn up" type="button" disabled>Buy Up --</button>
        <button id="sellUpBtn" class="sell-btn up" type="button" disabled>Sell Up --</button>
      </div>
      <div class="action-group">
        <button id="buyDownBtn" class="buy-btn down" type="button" disabled>Buy Down --</button>
        <button id="sellDownBtn" class="sell-btn down" type="button" disabled>Sell Down --</button>
      </div>
    </section>

    <section class="logging-controls" aria-label="Data logging controls">
      <label class="log-toggle" for="logToggle">
        <input id="logToggle" type="checkbox" />
        <span>Enable data logging</span>
      </label>
      <div class="log-downloads">
        <button id="downloadEventListBtn" class="log-btn" type="button" disabled>Download event_list.csv</button>
        <button id="downloadPriceFeedBtn" class="log-btn" type="button" disabled>Download price_feed_timeseries.csv</button>
      </div>
    </section>

    <div id="status" class="status"></div>
  </main>

    <script type="module" src="app.js"></script>
</body>
</html>
